openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FreshMood Restaurant QR Ordering API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Menu category operations
  - name: menu-items
    description: Menu item operations
  - name: orders
    description: Order operations
  - name: tables
    description: Table operations
  - name: payments
    description: Payment operations
  - name: admin
    description: Admin dashboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Categories
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all menu categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Menu Items
  /menu-items:
    get:
      operationId: listMenuItems
      tags: [menu-items]
      summary: List menu items (optionally filtered by category)
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createMenuItem
      tags: [menu-items]
      summary: Create a menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /menu-items/{id}:
    get:
      operationId: getMenuItem
      tags: [menu-items]
      summary: Get a single menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    patch:
      operationId: updateMenuItem
      tags: [menu-items]
      summary: Update a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteMenuItem
      tags: [menu-items]
      summary: Delete a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Tables
  /tables:
    get:
      operationId: listTables
      tags: [tables]
      summary: List all tables
      responses:
        "200":
          description: List of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Table"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create a table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  /tables/{tableNumber}:
    get:
      operationId: getTable
      tags: [tables]
      summary: Get table by number
      parameters:
        - name: tableNumber
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Table info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  # Orders
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, preparing, ready, completed, cancelled]
        - name: tableNumber
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # Payments
  /payments:
    post:
      operationId: createPayment
      tags: [payments]
      summary: Record a payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{orderId}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get payment for an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # Admin / Analytics
  /admin/dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [admin]
      summary: Get dashboard analytics summary
      parameters:
        - name: month
          in: query
          description: Filter by month in YYYY-MM format
          schema:
            type: string
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/top-items:
    get:
      operationId: getTopMenuItems
      tags: [admin]
      summary: Get best-selling menu items by order count
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: month
          in: query
          description: Filter by month in YYYY-MM format
          schema:
            type: string
      responses:
        "200":
          description: Top items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopMenuItem"

  /admin/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [admin]
      summary: Get recent orders for activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/revenue-by-day:
    get:
      operationId: getRevenueByDay
      tags: [admin]
      summary: Get revenue aggregated by day for the last N days or a specific month
      parameters:
        - name: days
          in: query
          schema:
            type: integer
        - name: month
          in: query
          description: Filter by month in YYYY-MM format (overrides days)
          schema:
            type: string
      responses:
        "200":
          description: Revenue by day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueByDay"

  /admin/item-sales:
    get:
      operationId: getItemSales
      tags: [admin]
      summary: Get all menu items with sales data sorted by qty sold
      parameters:
        - name: month
          in: query
          description: Filter by month in YYYY-MM format
          schema:
            type: string
      responses:
        "200":
          description: Item sales detail
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemSale"

  /admin/monthly-revenue:
    get:
      operationId: getMonthlyRevenue
      tags: [admin]
      summary: Get revenue and order count aggregated by month
      responses:
        "200":
          description: Monthly revenue list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyRevenue"

  /admin/payment-summary:
    get:
      operationId: getPaymentSummary
      tags: [admin]
      summary: Get revenue breakdown by payment method
      parameters:
        - name: month
          in: query
          description: Filter by month in YYYY-MM format
          schema:
            type: string
      responses:
        "200":
          description: Payment summary by method
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentMethodSummary"

  /admin/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [admin]
      summary: Get customer leaderboard ranked by total spending
      parameters:
        - name: month
          in: query
          description: Filter by month in YYYY-MM format
          schema:
            type: string
      responses:
        "200":
          description: Customer leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerLeaderboard"

  /admin/cashiers:
    get:
      operationId: listCashiers
      tags: [admin]
      summary: List all cashiers
      responses:
        "200":
          description: List of cashiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cashier"
    post:
      operationId: createCashier
      tags: [admin]
      summary: Create a new cashier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashierInput"
      responses:
        "200":
          description: Created cashier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cashier"

  /admin/cashiers/active:
    get:
      operationId: getActiveCashier
      tags: [admin]
      summary: Get the currently active cashier
      responses:
        "200":
          description: Active cashier or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cashier"

  /admin/cashiers/activate:
    post:
      operationId: activateCashier
      tags: [admin]
      summary: Set or clear the active cashier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateCashierInput"
      responses:
        "200":
          description: New active cashier or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cashier"

  /admin/cashiers/{id}:
    delete:
      operationId: deleteCashier
      tags: [admin]
      summary: Delete a cashier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /admin/reset-data:
    post:
      operationId: adminResetData
      tags: [admin]
      summary: Reset all sales data (orders, payments, order items) — irreversible
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminResetDataInput"
      responses:
        "200":
          description: Data reset success
          content:
            application/json:
              schema:
                type: object
                required: [message, deletedOrders]
                properties:
                  message:
                    type: string
                  deletedOrders:
                    type: integer
        "401":
          description: Wrong password

  /admin/register:
    post:
      operationId: adminRegister
      tags: [admin]
      summary: Register a new admin account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRegisterInput"
      responses:
        "200":
          description: Registration success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"
        "400":
          description: Validation error or username/email already taken

  /admin/forgot-password:
    post:
      operationId: adminForgotPassword
      tags: [admin]
      summary: Send OTP code to email for password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminForgotPasswordInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "404":
          description: Email not found

  /admin/reset-password:
    post:
      operationId: adminResetPassword
      tags: [admin]
      summary: Reset password using OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminResetPasswordInput"
      responses:
        "200":
          description: Password reset success
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "400":
          description: Invalid or expired OTP

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"
        "401":
          description: Invalid credentials

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      required: [id, name, sortOrder]
      properties:
        id:
          type: integer
        name:
          type: string
        sortOrder:
          type: integer

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        sortOrder:
          type: integer

    CategoryPatch:
      type: object
      properties:
        name:
          type: string
        sortOrder:
          type: integer

    MenuItem:
      type: object
      required: [id, categoryId, name, price, available, isBestSeller]
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        available:
          type: boolean
        isBestSeller:
          type: boolean

    MenuItemInput:
      type: object
      required: [categoryId, name, price]
      properties:
        categoryId:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        available:
          type: boolean
        isBestSeller:
          type: boolean

    MenuItemPatch:
      type: object
      properties:
        categoryId:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        available:
          type: boolean
        isBestSeller:
          type: boolean

    Table:
      type: object
      required: [id, tableNumber, qrCode]
      properties:
        id:
          type: integer
        tableNumber:
          type: integer
        qrCode:
          type: string
        label:
          type: ["string", "null"]

    TableInput:
      type: object
      required: [tableNumber]
      properties:
        tableNumber:
          type: integer
        label:
          type: string

    OrderItem:
      type: object
      required: [id, orderId, menuItemId, menuItemName, quantity, unitPrice, subtotal]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        menuItemId:
          type: integer
        menuItemName:
          type: string
        menuItemImageUrl:
          type: ["string", "null"]
        quantity:
          type: integer
        unitPrice:
          type: number
        subtotal:
          type: number
        notes:
          type: ["string", "null"]

    OrderItemInput:
      type: object
      required: [menuItemId, quantity]
      properties:
        menuItemId:
          type: integer
        quantity:
          type: integer
        notes:
          type: string

    Order:
      type: object
      required: [id, tableNumber, customerName, status, subtotal, tax, serviceFee, total, createdAt]
      properties:
        id:
          type: integer
        tableNumber:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, completed, cancelled]
        subtotal:
          type: number
        tax:
          type: number
        serviceFee:
          type: number
        total:
          type: number
        cashierName:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        paymentStatus:
          type: string
          enum: [unpaid, paid]
        estimatedMinutes:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderInput:
      type: object
      required: [tableNumber, customerName, items]
      properties:
        tableNumber:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        notes:
          type: string
        paymentMethod:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderStatusPatch:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, completed, cancelled]
        estimatedMinutes:
          type: integer

    Payment:
      type: object
      required: [id, orderId, method, amount, status, createdAt]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        method:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [pending, completed, failed]
        referenceCode:
          type: ["string", "null"]
        createdAt:
          type: string

    PaymentInput:
      type: object
      required: [orderId, method, amount]
      properties:
        orderId:
          type: integer
        method:
          type: string
        amount:
          type: number
        referenceCode:
          type: string

    DashboardSummary:
      type: object
      required: [totalOrders, totalRevenue, ordersToday, revenueToday, pendingOrders, preparingOrders, completedOrders, averageOrderValue]
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        ordersToday:
          type: integer
        revenueToday:
          type: number
        pendingOrders:
          type: integer
        preparingOrders:
          type: integer
        completedOrders:
          type: integer
        averageOrderValue:
          type: number

    TopMenuItem:
      type: object
      required: [menuItemId, name, orderCount, revenue]
      properties:
        menuItemId:
          type: integer
        name:
          type: string
        imageUrl:
          type: ["string", "null"]
        orderCount:
          type: integer
        revenue:
          type: number

    RevenueByDay:
      type: object
      required: [date, revenue, orderCount]
      properties:
        date:
          type: string
        revenue:
          type: number
        orderCount:
          type: integer

    ItemSale:
      type: object
      required: [menuItemId, name, price, qtySold, revenue, orderCount]
      properties:
        menuItemId:
          type: integer
        name:
          type: string
        imageUrl:
          type: ["string", "null"]
        price:
          type: number
        qtySold:
          type: integer
        revenue:
          type: number
        orderCount:
          type: integer

    MonthlyRevenue:
      type: object
      required: [month, revenue, orderCount]
      properties:
        month:
          type: string
        revenue:
          type: number
        orderCount:
          type: integer

    PaymentMethodSummary:
      type: object
      required: [paymentMethod, orderCount, totalRevenue, totalSubtotal, totalTax, totalServiceFee, avgOrderValue, revenueShare]
      properties:
        paymentMethod:
          type: string
        orderCount:
          type: integer
        totalRevenue:
          type: number
        totalSubtotal:
          type: number
        totalTax:
          type: number
        totalServiceFee:
          type: number
        avgOrderValue:
          type: number
        revenueShare:
          type: number

    CustomerLeaderboard:
      type: object
      required: [customerName, totalSpent, orderCount, rank]
      properties:
        rank:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: ["string", "null"]
        totalSpent:
          type: number
        orderCount:
          type: integer
        lastOrderAt:
          type: string

    Cashier:
      type: object
      required: [id, name, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string

    CashierInput:
      type: object
      required: [name]
      properties:
        name:
          type: string

    ActivateCashierInput:
      type: object
      properties:
        cashierId:
          type: ["integer", "null"]

    AdminResetDataInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminRegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string

    AdminForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    AdminResetPasswordInput:
      type: object
      required: [email, otp, newPassword]
      properties:
        email:
          type: string
        otp:
          type: string
        newPassword:
          type: string

    AdminLoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
